{{- if not .Values.auth.existingSecret }}
{{- if not .Values.auth.internalBearerToken }}
{{- fail "Set auth.internalBearerToken or auth.existingSecret before installing the chart." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vertex-openai-proxy.secretName" . }}
  labels:
    {{- include "vertex-openai-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.existingSecretKey }}: {{ .Values.auth.internalBearerToken | quote }}
  {{- if .Values.auth.vertexAccessToken }}
  vertex-access-token: {{ .Values.auth.vertexAccessToken | quote }}
  {{- end }}
{{- end }}
