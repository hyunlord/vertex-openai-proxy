profile: balanced

replicaCount: 2

auth:
  existingSecret: vertex-openai-proxy-auth
  existingSecretKey: internal-bearer-token

config:
  vertexChatModel: google/gemini-3.1-flash-lite-preview
  vertexChatModels: google/gemini-3.1-pro-preview
  vertexChatModelAliases: genos-flash=google/gemini-3.1-flash-lite-preview,genos-pro=google/gemini-3.1-pro-preview
  vertexEmbeddingModel: gemini-embedding-2-preview

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

runtime:
  embedding:
    adaptive:
      enabled: true
      maxConcurrency: 16
  service:
    adaptiveMode: true
    readinessFailOnDegraded: false
  queue:
    enabled: true
    disableOnDegraded: true
    chatMaxWaitMs: 200
    chatMaxDepth: 8
    embeddingsMaxWaitMs: 1000
    embeddingsMaxDepth: 4

prometheus:
  serviceMonitor:
    enabled: true
