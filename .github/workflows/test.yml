name: test

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: |
          python -m pytest tests -q
      - name: Run quick verify
        run: |
          bash scripts/verify_quick.sh
      - name: Run full verify
        run: |
          bash scripts/verify_full.sh
      - name: Run cross verify
        run: |
          bash scripts/verify_cross.sh
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Run Helm lint
        run: |
          helm lint ./charts/vertex-openai-proxy --set auth.internalBearerToken=ci-smoke-token
      - name: Verify Helm chart fails closed without auth secret
        run: |
          if helm template vertex-openai-proxy ./charts/vertex-openai-proxy >helm.out 2>helm.err; then
            echo "Expected chart rendering without auth secret to fail"
            exit 1
          fi
          grep -q "Set auth.internalBearerToken or auth.existingSecret" helm.err
      - name: Run Helm template
        run: |
          helm template vertex-openai-proxy ./charts/vertex-openai-proxy --set auth.internalBearerToken=ci-smoke-token
          helm template vertex-openai-proxy ./charts/vertex-openai-proxy -f ./charts/vertex-openai-proxy/examples/values-small.yaml --set auth.internalBearerToken=ci-smoke-token
          helm template vertex-openai-proxy ./charts/vertex-openai-proxy -f ./charts/vertex-openai-proxy/examples/values-balanced-hpa.yaml --set auth.internalBearerToken=ci-smoke-token
          helm template vertex-openai-proxy ./charts/vertex-openai-proxy -f ./charts/vertex-openai-proxy/examples/values-heavy-ingestion.yaml --set auth.internalBearerToken=ci-smoke-token
