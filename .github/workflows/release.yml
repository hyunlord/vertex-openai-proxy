name: release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test and verification gates
        run: |
          python -m pytest tests -q
          bash scripts/verify_quick.sh
          bash scripts/verify_full.sh
          bash scripts/verify_cross.sh

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Validate Helm chart
        run: |
          helm lint ./charts/vertex-openai-proxy --set auth.internalBearerToken=ci-release-token
          helm template vertex-openai-proxy ./charts/vertex-openai-proxy --set auth.internalBearerToken=ci-release-token
          helm template vertex-openai-proxy ./charts/vertex-openai-proxy -f ./charts/vertex-openai-proxy/examples/values-small.yaml --set auth.internalBearerToken=ci-release-token
          helm template vertex-openai-proxy ./charts/vertex-openai-proxy -f ./charts/vertex-openai-proxy/examples/values-balanced-hpa.yaml --set auth.internalBearerToken=ci-release-token
          helm template vertex-openai-proxy ./charts/vertex-openai-proxy -f ./charts/vertex-openai-proxy/examples/values-heavy-ingestion.yaml --set auth.internalBearerToken=ci-release-token
          helm template vertex-openai-proxy ./charts/vertex-openai-proxy -f ./charts/vertex-openai-proxy/examples/values-production.yaml --set auth.internalBearerToken=ci-release-token

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package ./charts/vertex-openai-proxy --destination ./dist

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=sha,format=short

      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vertex-openai-proxy-release-artifacts
          path: |
            dist/*.tgz

      - name: Attach Helm chart to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
